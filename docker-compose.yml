services:
  kvemu:
    build:
      context: ../backend
      dockerfile: deploy/Dockerfile
    container_name: kvemu
    ports:
      - '13000:13000'
    environment:
      KV_ADDR:          '0.0.0.0:13000'
      KV_VAULT_HOST:    '${KV_VAULT_HOST:-vault.kvemu.local:13000}'
      KV_TENANT_ID:     '${KV_TENANT_ID:-a0c2a3f5-e1b3-4d6a-9c41-2cdd1f2c7e0f}'
      KV_BASE_DOMAIN:   '${KV_BASE_DOMAIN:-kvemu.local}'
      KV_DEFAULT_VAULT: '${KV_DEFAULT_VAULT:-vault}'
      KV_TLS_AUTO:      'true'
      KV_TLS_SAN:       '${KV_TLS_SAN:-login.microsoftonline.com}'
      KV_AUTH_STRICT:   'false'
      KV_MASTER_KEY:    '${KV_MASTER_KEY:-}'
      KV_DATA:          '/data/kv.db'
      KV_CERT_DIR:      '/certs'
      KV_CA_OUT:        '/certs/ca.pem'
    volumes:
      - kvemu-data:/data
      - kvemu-certs:/certs
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'sh', '-c', 'wget -qO- --no-check-certificate https://localhost:13000/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      app_net:
        aliases:
          - kvemu.local
          - vault.kvemu.local
          - login.microsoftonline.com

  kv-interface:
    build: .
    container_name: kv-interface
    ports:
      - '3000:3000'
    environment:
      KEYVAULT_EMULATOR_URL:    '${KEYVAULT_EMULATOR_URL:-https://vault.kvemu.local:13000}'
      KEYVAULT_TENANT_ID:      '${KV_TENANT_ID:-a0c2a3f5-e1b3-4d6a-9c41-2cdd1f2c7e0f}'
      KEYVAULT_BASE_DOMAIN:    '${KEYVAULT_BASE_DOMAIN:-kvemu.local}'
      KEYVAULT_DEFAULT_VAULT:  '${KEYVAULT_DEFAULT_VAULT:-vault}'
      KEYVAULT_TITLE:          '${KEYVAULT_TITLE:-One Keyvault}'
      ORIGIN:                  'http://localhost:3000'
    depends_on:
      kvemu:
        condition: service_healthy
    restart: unless-stopped
    networks:
      app_net: {}

volumes:
  kvemu-data:
  kvemu-certs:

networks:
  app_net:
    driver: bridge
